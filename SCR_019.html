<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCR_019 로그인화면 | GA 시책관리 시스템</title>
<link rel="stylesheet" href="common.css">
<style>
body { background: linear-gradient(135deg, #0F2840 0%, #1A3A5C 50%, #1a5276 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-wrap { width:420px; }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .badge { display:inline-block; background:var(--accent); color:#fff; font-size:11px; font-weight:700; letter-spacing:2px; padding:4px 12px; border-radius:4px; margin-bottom:12px; }
.login-logo h1 { color:#fff; font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.login-logo p { color:rgba(255,255,255,.5); font-size:13px; margin-top:6px; }
.login-card { background:#fff; border-radius:12px; padding:36px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
.login-card h2 { font-size:18px; font-weight:700; color:var(--primary); margin-bottom:4px; }
.login-card p { font-size:13px; color:var(--text-muted); margin-bottom:24px; }
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:12px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
.login-input {
  width:100%; height:42px; padding:0 14px;
  border:1.5px solid var(--border); border-radius:6px;
  font-size:14px; font-family:inherit; color:var(--text-primary);
  transition:border-color .15s; outline:none; background:#fff;
}
.login-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(46,134,193,.12); }
.login-btn {
  width:100%; height:44px; background:var(--primary); color:#fff;
  border:none; border-radius:6px; font-size:15px; font-weight:600;
  font-family:inherit; cursor:pointer; margin-top:8px;
  transition:background .15s;
}
.login-btn:hover { background:var(--primary-hover); }
.login-note { text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted); }
.screen-label {
  position:fixed; bottom:16px; right:16px;
  background:rgba(0,0,0,.5); color:#fff; font-size:11px;
  padding:4px 10px; border-radius:4px; font-family:'IBM Plex Mono',monospace;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="badge">GA SYSTEM</div>
    <h1>시책관리 시스템</h1>
    <p>에셋 보험대리점 시책 운영 플랫폼</p>
  </div>
  <div class="login-card">
    <h2>로그인</h2>
    <p>사번과 비밀번호를 입력하세요</p>
    <div class="login-field">
      <label>사번 (ID)</label>
      <input type="text" class="login-input" placeholder="사번을 입력하세요" value="admin">
    </div>
    <div class="login-field">
      <label>비밀번호</label>
      <input type="password" class="login-input" placeholder="비밀번호를 입력하세요" value="••••••••">
    </div>
    <button class="login-btn" onclick="location.href='SCR_020.html'">로그인</button>
    <p class="login-note">시스템 접근 권한 문의: 시스템관리팀</p>
  </div>
</div>
<div class="screen-label">SCR_019 · 로그인화면</div>
</body>
</html>
