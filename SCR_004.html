<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCR_004 기본정보 등록 | GA 시책관리 시스템</title>
<link rel="stylesheet" href="common.css">
<script src="common.js"></script>
<style>
/* 좌우 2단 레이아웃 */
.form-two-col {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 16px;
  align-items: start;
}

/* 기본정보 폼 - 1행씩 세로 배치 */
.form-vertical .form-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light, #f0f0f0);
  gap: 12px;
}
.form-vertical .form-row:last-child {
  border-bottom: none;
}
.form-vertical .form-row label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary, #555);
  white-space: nowrap;
}
.form-vertical .form-row label.required::after {
  content: ' *';
  color: var(--danger);
}

/* 적용특이사항 폼 */
.special-section {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.special-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 0;
  border-bottom: 1px solid var(--border-light, #f0f0f0);
  gap: 12px;
}
.special-row:last-child {
  border-bottom: none;
}
.special-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary, #555);
  white-space: nowrap;
}

/* Y/N 토글 버튼 */
.yn-group {
  display: flex;
  gap: 0;
  border: 1px solid var(--border, #ddd);
  border-radius: 6px;
  overflow: hidden;
}
.yn-btn {
  padding: 5px 18px;
  font-size: 13px;
  font-weight: 700;
  background: #fff;
  border: none;
  cursor: pointer;
  color: var(--text-muted, #aaa);
  transition: background 0.15s, color 0.15s;
}
.yn-btn:first-child {
  border-right: 1px solid var(--border, #ddd);
}
.yn-btn.active-y {
  background: var(--success, #22c55e);
  color: #fff;
}
.yn-btn.active-n {
  background: var(--danger, #ef4444);
  color: #fff;
}

/* 인정한도 특이사항 */
.limit-row {
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}
.limit-row .special-label {
  margin-bottom: 2px;
}
.limit-inputs {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
}
.limit-inputs select {
  flex: 1;
  min-width: 0;
}
.limit-inputs input[type="number"] {
  width: 70px;
  flex-shrink: 0;
}
.limit-inputs span {
  font-size: 13px;
  color: var(--text-muted);
  white-space: nowrap;
}
</style>
</head>
<body>
<div id="gnb"></div>
<div class="layout">
  <div id="lnb"></div>
  <main class="content">
    <div class="page-header">
      <div class="page-header-left">
        <div class="breadcrumb"><a href="SCR_020.html">홈</a><span>›</span><span>기준관리</span><span>›</span><a href="SCR_003.html">지급기준 관리</a><span>›</span><span>기본정보 등록</span></div>
        <div class="page-title">시책 지급기준 등록</div>
        <div class="page-subtitle">SCR_004 · 기본정보 등록 → SCR_005 · 상세정보 Step1 → SCR_006 · Step2 → SCR_007 · Step3</div>
      </div>
    </div>

    <!-- 스텝 위저드 -->
    <div class="step-wizard">
      <div class="step-item active">
        <div class="step-num">1</div>
        <div class="step-info">
          <div class="step-label">SCR_004</div>
          <div class="step-title">기본정보 등록</div>
        </div>
      </div>
      <div class="step-item">
        <div class="step-num">2</div>
        <div class="step-info">
          <div class="step-label">SCR_005</div>
          <div class="step-title">상세정보 Step1</div>
        </div>
      </div>
      <div class="step-item">
        <div class="step-num">3</div>
        <div class="step-info">
          <div class="step-label">SCR_006</div>
          <div class="step-title">상세정보 Step2</div>
        </div>
      </div>
      <div class="step-item">
        <div class="step-num">4</div>
        <div class="step-info">
          <div class="step-label">SCR_007</div>
          <div class="step-title">상세정보 Step3</div>
        </div>
      </div>
    </div>

    <!-- 좌우 2단 레이아웃 -->
    <div class="form-two-col">

      <!-- 좌측: 기본정보 -->
      <div class="card">
        <div class="card-header"><div class="card-title">기본정보</div></div>
        <div class="form-vertical" style="padding: 4px 0;">

          <div class="form-row">
            <label class="required">보험회사</label>
            <select class="form-control">
              <option value="">선택</option>
              <option selected>삼성생명</option>
              <option>한화생명</option>
              <option>교보생명</option>
              <option>NH농협생명</option>
            </select>
          </div>

          <div class="form-row">
            <label class="required">시책명</label>
            <input type="text" class="form-control" placeholder="시책명을 입력하세요" value="종신 GA시책 (04월)">
          </div>

          <div class="form-row">
            <label class="required">적용 업적년월</label>
            <input type="month" class="form-control" value="2026-04">
          </div>

          <div class="form-row">
            <label class="required">지급년월</label>
            <input type="month" class="form-control" value="2026-05">
          </div>

          <div class="form-row">
            <label class="required">적용 환수기준</label>
            <select class="form-control">
              <option>RCL_2024_001 · 삼성생명 표준환수</option>
              <option>RCL_2024_002 · 한화생명 환수기준</option>
              <option>RCL_2024_003 · 교보생명 환수기준</option>
            </select>
          </div>

          <div class="form-row">
            <label>원수사 시책 참조</label>
            <select class="form-control">
              <option>2026년 4월 GA 시책 지급 기준 (종신/CI/건강)</option>
            </select>
          </div>

          <div class="form-row">
            <label>처리단계</label>
            <input type="text" class="form-control" value="작성중" readonly style="background:#f8fafd;color:var(--text-muted);">
          </div>

        </div>
      </div>

      <!-- 우측: 적용 특이사항 -->
      <div class="card">
        <div class="card-header"><div class="card-title">적용 특이사항</div></div>
        <div class="special-section" style="padding: 4px 0;">

          <!-- 본인계약 지급 -->
          <div class="special-row">
            <span class="special-label">본인계약 지급</span>
            <div class="yn-group">
              <button class="yn-btn active-y" onclick="toggleYN(this, 'Y')">Y</button>
              <button class="yn-btn" onclick="toggleYN(this, 'N')">N</button>
            </div>
          </div>

          <!-- 부활재지급 -->
          <div class="special-row">
            <span class="special-label">부활재지급</span>
            <div class="yn-group">
              <button class="yn-btn" onclick="toggleYN(this, 'Y')">Y</button>
              <button class="yn-btn active-n" onclick="toggleYN(this, 'N')">N</button>
            </div>
          </div>

          <!-- 비원납지급 -->
          <div class="special-row">
            <span class="special-label">비원납지급</span>
            <div class="yn-group">
              <button class="yn-btn" onclick="toggleYN(this, 'Y')">Y</button>
              <button class="yn-btn active-n" onclick="toggleYN(this, 'N')">N</button>
            </div>
          </div>

          <!-- 인정한도 특이사항 -->
          <div class="special-row limit-row">
            <span class="special-label">인정한도 특이사항</span>
            <div class="limit-inputs">
              <select class="form-control">
                <option value="">상품 선택</option>
                <option>종신보험</option>
                <option>CI보험</option>
                <option>건강보험</option>
                <option>연금보험</option>
                <option>변액보험</option>
              </select>
              <input type="number" class="form-control" placeholder="0" min="0" max="100" value="">
              <span>% 인정</span>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /form-two-col -->

    <!-- 버튼 -->
    <div class="flex justify-between mt-4">
      <button class="btn btn-outline" onclick="location.href='SCR_003.html'">← 목록으로</button>
      <div class="flex gap-2">
        <button class="btn btn-outline">임시저장</button>
        <button class="btn btn-primary" onclick="location.href='SCR_005.html'">저장 후 다음 →</button>
      </div>
    </div>

  </main>
</div>
<script>
document.getElementById('gnb').innerHTML = renderGNB();
document.getElementById('lnb').innerHTML = renderLNB('SCR_003');

function toggleYN(btn, val) {
  const group = btn.closest('.yn-group');
  const btns = group.querySelectorAll('.yn-btn');
  btns.forEach(b => b.classList.remove('active-y', 'active-n'));
  if (val === 'Y') btn.classList.add('active-y');
  else btn.classList.add('active-n');
}
</script>
</body>
</html>
