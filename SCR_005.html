<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCR_005 상세정보 Step1 | GA 시책관리 시스템</title>
<link rel="stylesheet" href="common.css">
<script src="common.js"></script>
<style>
/* ── Chip ──────────────────────────────────────── */
.axis-selector { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.axis-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:6px 14px; border:1.5px solid var(--border);
  border-radius:20px; font-size:12px; font-weight:500;
  cursor:pointer; background:#fff; color:var(--text-secondary);
  transition:all .15s; user-select:none;
}
.axis-chip:hover { border-color:var(--accent); color:var(--primary); }
.axis-chip.active { border-color:#1a6ea8; background:#EBF5FB; color:#1a6ea8; font-weight:700; }
.chip-icon { font-size:13px; }

/* ── Grid ──────────────────────────────────────── */
.incv-grid { width:100%; border-collapse:collapse; font-size:12px; }
.incv-grid th {
  padding:7px 8px; border:1px solid var(--border);
  text-align:center; font-size:11px; font-weight:700;
  white-space:nowrap; position:sticky; top:0; z-index:1;
  background:#EBF5FB; color:#1a6ea8;
}
.incv-grid th.th-axis { background:#EDF7ED; color:#2e7d32; }
.incv-grid th.th-pay  { background:#FFF3E0; color:#e65100; }
.incv-grid th.th-ctrl { background:#F4F7FB; width:28px; }
.incv-grid td { padding:3px 4px; border:1px solid var(--border-light); vertical-align:middle; }

/* 공통 인풋 */
.axis-input, .cell-input, .goods-nm, .goods-amt,
.pay-amt, .corp-amt, .staff-amt {
  width:100%; height:26px; padding:0 5px;
  border:1px solid transparent; background:transparent;
  font-size:12px; box-sizing:border-box; border-radius:3px;
}
.cell-input, .goods-amt, .pay-amt, .corp-amt, .staff-amt {
  font-family:'IBM Plex Mono',monospace; text-align:right;
}
.axis-input { text-align:center; color:#1b5e20; font-weight:500; }
.axis-input:focus, .cell-input:focus, .goods-nm:focus, .goods-amt:focus,
.pay-amt:focus, .corp-amt:focus, .staff-amt:focus {
  border-color:var(--accent); background:#fff; outline:none;
}
/* 사용자 정의 열 헤더 */
.col-nm-input {
  height:24px; padding:0 4px; width:calc(100% - 22px);
  border:1px solid #c8dff7; border-radius:3px; font-size:11px;
  background:#EBF5FB; font-weight:700; color:#1a6ea8;
}
.col-nm-input:focus { outline:none; border-color:var(--accent); background:#fff; }
.col-del-btn {
  width:18px; height:18px; border:none; background:none;
  cursor:pointer; color:var(--text-muted); font-size:13px;
  vertical-align:middle; padding:0; margin-left:2px;
}
.col-del-btn:hover { color:var(--danger); }
/* 행 삭제 버튼 */
.row-del-btn {
  background:none; border:none; cursor:pointer;
  color:var(--text-muted); font-size:15px; line-height:1;
  padding:0 3px; display:block; margin:auto;
}
.row-del-btn:hover { color:var(--danger); }
/* 현물 비활성 */
.goods-nm.disabled-input, .goods-amt.disabled-input {
  background:#f0f0f0; color:#aaa; pointer-events:none;
}
td.goods-cell { background:#FFFDF7; }
/* 빈 상태 */
.grid-empty {
  padding:40px; text-align:center; color:var(--text-muted);
  font-size:13px; background:#fafbfc; border-radius:var(--radius);
  border:1px dashed var(--border);
}
</style>
</head>
<body>
<div id="gnb"></div>
<div class="layout">
  <div id="lnb"></div>
  <main class="content">

    <div class="page-header">
      <div class="page-header-left">
        <div class="breadcrumb">
          <a href="SCR_020.html">홈</a><span>›</span>
          <a href="SCR_003.html">지급기준 관리</a><span>›</span>
          <span>상세정보 Step1</span>
        </div>
        <div class="page-title">시책 지급기준 — 상세정보 Step1</div>
        <div class="page-subtitle">삼성생명 · 종신 GA시책 (04월) · 업적년월: 2026-04</div>
      </div>
    </div>

    <!-- 스텝 위저드 -->
    <div class="step-wizard">
      <div class="step-item done"><div class="step-num">✓</div><div class="step-info"><div class="step-label">SCR_004</div><div class="step-title">기본정보 등록</div></div></div>
      <div class="step-item active"><div class="step-num">2</div><div class="step-info"><div class="step-label">SCR_005</div><div class="step-title">상세정보 Step1</div></div></div>
      <div class="step-item"><div class="step-num">3</div><div class="step-info"><div class="step-label">SCR_006</div><div class="step-title">상세정보 Step2</div></div></div>
      <div class="step-item"><div class="step-num">4</div><div class="step-info"><div class="step-label">SCR_007</div><div class="step-title">상세정보 Step3</div></div></div>
    </div>

    <!-- ① 행 기준 선택 -->
    <div class="card" style="margin-bottom:14px;">
      <div class="card-header">
        <div class="card-title">행 기준 (Row Axis) 선택</div>
        <span class="text-muted text-sm">선택한 항목이 Grid 좌측 컬럼으로 추가됩니다 · 복수 선택 가능</span>
      </div>
      <div class="axis-selector" id="rowAxisSelector">
        <label class="axis-chip" data-code="ROW_01"><span class="chip-icon">📦</span>상품구분</label>
        <label class="axis-chip" data-code="ROW_02"><span class="chip-icon">📅</span>납기구분</label>
        <label class="axis-chip" data-code="ROW_05"><span class="chip-icon">🔄</span>연속가동</label>
        <label class="axis-chip" data-code="ROW_MON"><span class="chip-icon">💵</span>월납보험료</label>
        <label class="axis-chip" data-code="ROW_TOT"><span class="chip-icon">💰</span>합계보험료</label>
      </div>
    </div>

    <!-- ② 지급 기준 Grid -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">지급 기준 Grid</div>
        <div class="flex gap-2">
          <button class="btn btn-outline btn-sm" onclick="addRow()">+ 행 추가</button>
          <button class="btn btn-accent btn-sm"  onclick="addCustomCol()">+ 열 추가</button>
        </div>
      </div>
      <div id="gridContainer">
        <div class="grid-empty">행 기준 chip을 선택하거나 [+ 행 추가]를 클릭하면 Grid가 생성됩니다.</div>
      </div>
    </div>

    <!-- 버튼 -->
    <div class="flex justify-between mt-4">
      <button class="btn btn-outline" onclick="location.href='SCR_004.html'">← 이전</button>
      <div class="flex gap-2">
        <button class="btn btn-outline" onclick="alert('임시저장되었습니다.')">임시저장</button>
        <button class="btn btn-primary" onclick="location.href='SCR_006.html'">저장 후 다음 →</button>
      </div>
    </div>

  </main>
</div>

<script>
document.getElementById('gnb').innerHTML = renderGNB();
document.getElementById('lnb').innerHTML = renderLNB('SCR_003');

/* ══ 마스터 데이터 ════════════════════════════════ */
const AXIS_DEFS = {
  ROW_01:  { nm:'상품구분',   icon:'📦', hasOp: false }, // 항상 = (연산자 불필요)
  ROW_02:  { nm:'납기구분',   icon:'📅', hasOp: true  }, // = / >=
  ROW_05:  { nm:'연속가동',   icon:'🔄', hasOp: false }, // 항상 =
  ROW_MON: { nm:'월납보험료', icon:'💵', hasOp: true  }, // = / >=
  ROW_TOT: { nm:'합계보험료', icon:'💰', hasOp: true  }, // = / >=
};

/* ══ 상태 변수 ════════════════════════════════════ */
let selectedAxes = [];
let customCols   = [];
let colCounter   = 1;
let rowDataArr   = [];

/* ══ DOM → rowDataArr 동기화 ═════════════════════ */
function syncFromDOM() {
  const tbody = document.querySelector('#gridContainer tbody');
  if (!tbody) return;
  const trs = [...tbody.querySelectorAll('tr')];
  while (rowDataArr.length < trs.length) rowDataArr.push({});
  trs.forEach((tr, ri) => {
    const rd = rowDataArr[ri];
    if (!rd.axes)   rd.axes   = {};
    if (!rd.custom) rd.custom = {};
    tr.querySelectorAll('.op-select').forEach(i  => { rd.axes[i.dataset.axis] = i.value; });
    tr.querySelectorAll('.axis-input').forEach(i => { rd.axes[i.dataset.axis] = i.value; });
    tr.querySelectorAll('.cell-input').forEach(i => { rd.custom[i.dataset.col] = i.value; });
    rd.payMethod = tr.querySelector('.pm-select')?.value    || '현금';
    rd.goodsNm   = tr.querySelector('.goods-nm')?.value     || '';
    rd.goodsAmt  = tr.querySelector('.goods-amt')?.value    || '';
    rd.ratioType = tr.querySelector('.ratio-select')?.value || '비율';
    rd.payAmt    = tr.querySelector('.pay-amt')?.value      || '';
    rd.corpAmt   = tr.querySelector('.corp-amt')?.value     || '';
    rd.staffAmt  = tr.querySelector('.staff-amt')?.value    || '';
  });
}

/* ══ Chip 토글 ═══════════════════════════════════ */
document.querySelectorAll('#rowAxisSelector .axis-chip').forEach(chip => {
  chip.addEventListener('click', (e) => {
    e.preventDefault();
    syncFromDOM();
    chip.classList.toggle('active');
    const code = chip.dataset.code;
    if (chip.classList.contains('active')) {
      if (!selectedAxes.includes(code)) selectedAxes.push(code);
      if (rowDataArr.length === 0) rowDataArr = [{}];
    } else {
      selectedAxes = selectedAxes.filter(c => c !== code);
    }
    rebuildGrid();
  });
});

/* ══ 사용자 정의 열 ══════════════════════════════ */
function addCustomCol() {
  syncFromDOM();
  const id = 'c' + colCounter;
  colCounter++;
  customCols.push({ id, nm: '구간 ' + (colCounter - 1) });
  if (rowDataArr.length === 0) rowDataArr = [{}];
  rebuildGrid();
}
function removeCustomCol(colId) {
  syncFromDOM();
  customCols = customCols.filter(c => c.id !== colId);
  rebuildGrid();
}
function updateColNm(input) {
  const col = customCols.find(c => c.id === input.dataset.colId);
  if (col) col.nm = input.value;
}

/* ══ 행 추가 / 삭제 ══════════════════════════════ */
function addRow() {
  syncFromDOM();
  rowDataArr.push({});
  rebuildGrid();
}
function delRow(btn) {
  syncFromDOM();
  const idx = [...btn.closest('tbody').querySelectorAll('tr')]
               .indexOf(btn.closest('tr'));
  if (rowDataArr.length <= 1) { alert('행은 최소 1개 이상이어야 합니다.'); return; }
  rowDataArr.splice(idx, 1);
  rebuildGrid();
}

/* ══ Grid 재생성 ══════════════════════════════════ */
function rebuildGrid() {
  const container = document.getElementById('gridContainer');
  const hasData   = selectedAxes.length > 0 || customCols.length > 0 || rowDataArr.length > 0;

  if (!hasData) {
    container.innerHTML = '<div class="grid-empty">행 기준 chip을 선택하거나 [+ 행 추가]를 클릭하면 Grid가 생성됩니다.</div>';
    return;
  }
  if (rowDataArr.length === 0) rowDataArr = [{}];

  /* 헤더 1행: 그룹 */
  let h1 = '';
  if (selectedAxes.length > 0)
    h1 += `<th colspan="${selectedAxes.length}" class="th-axis">행 기준 (Axis)</th>`;
  if (customCols.length > 0)
    h1 += `<th colspan="${customCols.length}" style="background:#EBF5FB;color:#1a6ea8;">사용자 정의</th>`;
  h1 += `<th colspan="7" class="th-pay">지급 정보</th>`;
  h1 += `<th class="th-ctrl" rowspan="2"></th>`;

  /* 헤더 2행: 개별 컬럼명 */
  let h2 = '';
  selectedAxes.forEach(code => {
    h2 += `<th class="th-axis">${AXIS_DEFS[code].icon} ${AXIS_DEFS[code].nm}</th>`;
  });
  customCols.forEach(col => {
    h2 += `<th>
      <input type="text" class="col-nm-input" data-col-id="${col.id}"
             value="${col.nm}" onchange="updateColNm(this)" placeholder="열 이름">
      <button class="col-del-btn" onclick="removeCustomCol('${col.id}')" title="열 삭제">×</button>
    </th>`;
  });
  h2 += `
    <th class="th-pay" style="min-width:72px;">지급방법</th>
    <th class="th-pay" style="min-width:90px;">물품명</th>
    <th class="th-pay" style="min-width:80px;">대체금액</th>
    <th class="th-pay" style="min-width:64px;">비율구분</th>
    <th class="th-pay" style="min-width:70px;">지급액</th>
    <th class="th-pay" style="min-width:72px;">법인</th>
    <th class="th-pay" style="min-width:72px;">사용인</th>`;

  /* 데이터 행들 */
  let tbody = '';
  rowDataArr.forEach((rd, ri) => {
    let cells = '';

    /* Axis 열 */
    selectedAxes.forEach(code => {
      const v  = (rd.axes && rd.axes[code])           || '';
      const op = (rd.axes && rd.axes[code + '_op'])   || '=';
      if (AXIS_DEFS[code].hasOp) {
        /* 연산자 선택 + 값 입력 (납기구분, 월납보험료, 합계보험료) */
        cells += `<td style="padding:2px 3px; min-width:110px;">
          <div style="display:flex;gap:3px;align-items:center;">
            <select class="op-select" data-axis="${code}_op"
                    style="flex:0 0 42px;height:26px;font-size:12px;
                           border:1px solid var(--border);border-radius:3px;
                           padding:0 2px;background:#fff;text-align:center;">
              <option value="="${op==='='?' selected':''}>＝</option>
              <option value=">="${op==='>='?' selected':''}>≥</option>
            </select>
            <input type="text" class="axis-input" data-axis="${code}"
                   value="${v}" placeholder="값 입력"
                   style="flex:1;min-width:60px;">
          </div>
        </td>`;
      } else {
        /* 연산자 없음 (상품구분, 연속가동) */
        cells += `<td><input type="text" class="axis-input" data-axis="${code}"
                       value="${v}" placeholder="값 입력"></td>`;
      }
    });

    /* 사용자 정의 열 */
    customCols.forEach(col => {
      const v = (rd.custom && rd.custom[col.id]) || '';
      cells += `<td><input type="text" class="cell-input" data-col="${col.id}"
                     value="${v}" placeholder="0"></td>`;
    });

    /* 지급정보 고정 열 7개 */
    const pm  = rd.payMethod  || '현금';
    const gn  = rd.goodsNm   || '';
    const ga  = rd.goodsAmt  || '';
    const rt  = rd.ratioType || '비율';
    const pa  = rd.payAmt    || '';
    const ca  = rd.corpAmt   || '';
    const sa  = rd.staffAmt  || '';
    const gDis  = pm === '현금' ? ' disabled class="goods-nm disabled-input"' : ' class="goods-nm"';
    const gDis2 = pm === '현금' ? ' disabled class="goods-amt disabled-input"' : ' class="goods-amt"';
    cells += `
      <td style="padding:3px 4px;">
        <select class="pm-select" onchange="toggleGoods(this)">
          <option value="현금"${pm==='현금'?' selected':''}>현금</option>
          <option value="현물"${pm==='현물'?' selected':''}>현물</option>
        </select>
      </td>
      <td class="goods-cell"><input type="text"${gDis} value="${gn}" placeholder="물품명" style="min-width:80px;"></td>
      <td class="goods-cell"><input type="number"${gDis2} value="${ga}" placeholder="0" style="width:72px;"></td>
      <td style="padding:3px 4px;">
        <select class="ratio-select" onchange="adjustPayAmt(this)">
          <option value="비율"${rt==='비율'?' selected':''}>비율</option>
          <option value="정액"${rt==='정액'?' selected':''}>정액</option>
        </select>
      </td>
      <td><input type="text" class="pay-amt" value="${pa}"
                 placeholder="${rt==='비율'?'%':'원'}" style="width:62px;"></td>
      <td><input type="number" class="corp-amt" value="${ca}" placeholder="0" style="width:66px;"></td>
      <td><input type="number" class="staff-amt" value="${sa}" placeholder="0" style="width:66px;"></td>
      <td class="th-ctrl"><button class="row-del-btn" onclick="delRow(this)" title="행 삭제">×</button></td>`;

    tbody += `<tr>${cells}</tr>`;
  });

  container.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="incv-grid">
        <thead><tr>${h1}</tr><tr>${h2}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
}

/* ══ 현물/현금 전환 ══════════════════════════════ */
function toggleGoods(sel) {
  const row = sel.closest('tr');
  const gn  = row.querySelector('.goods-nm');
  const ga  = row.querySelector('.goods-amt');
  const isObj = sel.value === '현물';
  gn.disabled = !isObj; ga.disabled = !isObj;
  if (isObj) {
    gn.classList.remove('disabled-input'); ga.classList.remove('disabled-input');
  } else {
    gn.classList.add('disabled-input');    ga.classList.add('disabled-input');
    gn.value = ''; ga.value = '';
  }
}

/* ══ 비율/정액 전환 ══════════════════════════════ */
function adjustPayAmt(sel) {
  sel.closest('tr').querySelector('.pay-amt').placeholder =
    sel.value === '비율' ? '%' : '원';
}
</script>
</body>
</html>
